<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVUS — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #080c12;
    --paper: #e8edf5;
    --blue: #3a8fff;
    --blue-light: #6fb3ff;
    --muted: #3d5170;
    --rule: rgba(58,143,255,0.15);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    min-height: 100%;
    background: var(--ink);
    color: var(--paper);
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    overflow-x: hidden;
  }

  /* GRAIN */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 10;
    opacity: 0.5;
  }

  /* GLOW */
  body::after {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(58,143,255,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* GRID LINES */
  .grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(58,143,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(58,143,255,0.04) 1px, transparent 1px);
    background-size: 80px 80px;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 40px 56px;
  }

  /* NAV */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.3s;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--blue);
  }

  .logo-sub {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 5px;
  }

  .nav-right {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: right;
    line-height: 2;
  }

  /* CENTER */
  .center {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: 0;
  }

  .eyebrow {
    font-size: 9px;
    letter-spacing: 0.5em;
    color: var(--blue);
    text-transform: uppercase;
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.6s;
  }

  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(56px, 10vw, 130px);
    font-weight: 300;
    line-height: 0.9;
    letter-spacing: -0.01em;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.8s;
  }

  .headline em {
    font-style: italic;
    color: var(--blue-light);
  }

  .divider {
    width: 1px;
    height: 60px;
    background: linear-gradient(to bottom, transparent, var(--blue), transparent);
    margin: 40px auto;
    opacity: 0;
    animation: fadeIn 1s ease forwards 1.2s;
  }

  .tagline {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    line-height: 2.2;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.4s;
  }

  .tagline span {
    color: var(--paper);
  }

  /* NOTIFY */
  .notify {
    margin-top: 48px;
    display: flex;
    gap: 0;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.6s;
  }

  .notify input {
    background: rgba(58,143,255,0.05);
    border: 1px solid var(--rule);
    border-right: none;
    padding: 14px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--paper);
    width: 260px;
    outline: none;
    letter-spacing: 0.05em;
    transition: border-color 0.3s;
  }
  .notify input::placeholder { color: var(--muted); }
  .notify input:focus { border-color: rgba(58,143,255,0.4); }

  .notify button {
    background: var(--blue);
    border: none;
    padding: 14px 28px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink);
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .notify button:hover { background: var(--blue-light); }

  .notify-confirm {
    display: none;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--blue-light);
    text-transform: uppercase;
    margin-top: 16px;
    text-align: center;
  }

  /* FOOTER */
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.8s;
  }

  .footer-left {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    line-height: 2;
  }

  .footer-right {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: right;
  }

  .footer-right a {
    color: var(--blue);
    text-decoration: none;
  }

  /* CORNER ACCENTS */
  .corner {
    position: fixed;
    width: 24px;
    height: 24px;
    z-index: 3;
    opacity: 0.3;
  }
  .corner-tl { top: 24px; left: 24px; border-top: 1px solid var(--blue); border-left: 1px solid var(--blue); }
  .corner-tr { top: 24px; right: 24px; border-top: 1px solid var(--blue); border-right: 1px solid var(--blue); }
  .corner-bl { bottom: 24px; left: 24px; border-bottom: 1px solid var(--blue); border-left: 1px solid var(--blue); }
  .corner-br { bottom: 24px; right: 24px; border-bottom: 1px solid var(--blue); border-right: 1px solid var(--blue); }

  /* SCAN LINE */
  .scanline {
    position: fixed;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(58,143,255,0.15), transparent);
    animation: scan 8s linear infinite;
    z-index: 1;
  }

  @keyframes scan {
    0%   { top: -1px; }
    100% { top: 100vh; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @media (max-width: 600px) {
    .container { padding: 28px 24px; }
    .notify input { width: 180px; }
    .footer { flex-direction: column; gap: 8px; align-items: center; text-align: center; }
  }
</style>
</head>
<body>

<div class="grid"></div>
<div class="scanline"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="container">

  <nav class="nav">
    <div>
      <div class="logo">NOVUS</div>

    </div>
    <div class="nav-right">
      Inbound Pre-Qualification<br>

  <div class="center">

    <h1 class="headline">

    </h1>
    <div class="divider"></div>
    <p class="tagline">
      <span>Eligibility Governs Engagement.</span><br>

      novusverify.com
    </p>

    <div style="display:flex; flex-direction:column; align-items:center;">
      <div class="notify">
        <input type="email" placeholder="your@email.com" id="emailInput" />

      <p class="notify-confirm" id="confirm">✓ You're on the list.</p>

  </div>

  <footer class="footer">
    <div class="footer-left">
      © 2026 Novus Verify<br>

    <div class="footer-right">
      <a href="/cdn-cgi/l/email-protection#c5ada0a9a9aa85abaab3b0b6b3a0b7aca3bceba6aaa8"><span class="__cf_email__" data-cfemail="f59d9099999ab59b9a8380868390879c938cdb969a98">[email&#160;protected]</span></a>
    </div>
  </footer>

</div>
