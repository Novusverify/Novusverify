<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVUS — Coming Soon</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #080c12;
    --paper: #e8edf5;
    --blue: #3a8fff;
    --blue-light: #6fb3ff;
    --muted: #3d5170;
    --rule: rgba(58,143,255,0.15);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    background: var(--ink);
    color: var(--paper);
    font-family: 'DM Mono', monospace;
    font-weight: 300;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 10;
    opacity: 0.5;
  }
  body::after {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(58,143,255,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  .grid {
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(58,143,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(58,143,255,0.04) 1px, transparent 1px);
    background-size: 80px 80px;
    z-index: 0;
  }
  .container {
    position: relative;
    z-index: 2;
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 40px 56px;
  }
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.3s;
  }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--blue);
  }
  .logo-sub {
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 5px;
  }
  .nav-right {
    font-size: 9px;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: right;
    line-height: 2;
  }
  .center {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 60px 0;
  }
  .eyebrow {
    font-size: 9px;
    letter-spacing: 0.5em;
    color: var(--blue);
    text-transform: uppercase;
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 0.6s;
  }
  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(56px, 10vw, 130px);
    font-weight: 300;
    line-height: 0.9;
    letter-spacing: -0.01em;
    opacity: 0;
    animation: fadeUp 1s ease forwards 0.8s;
  }
  .headline em {
    font-style: italic;
    color: var(--blue-light);
  }
  .divider {
    width: 1px;
    height: 60px;
    background: linear-gradient(to bottom, transparent, var(--blue), transparent);
    margin: 40px auto;
    opacity: 0;
    animation: fadeIn 1s ease forwards 1.2s;
  }
  .tagline {
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--muted);
    text-transform: uppercase;
    line-height: 2.2;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.4s;
  }
  .tagline span { color: var(--paper); }
  .notify-wrap {
    margin-top: 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.6s;
  }
  .notify-row {
    display: flex;
    gap: 0;
  }
  .notify-row input {
    background: rgba(58,143,255,0.05);
    border: 1px solid var(--rule);
    border-right: none;
    padding: 14px 24px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--paper);
    width: 260px;
    outline: none;
    letter-spacing: 0.05em;
    transition: border-color 0.3s;
  }
  .notify-row input::placeholder { color: var(--muted); }
  .notify-row input:focus { border-color: rgba(58,143,255,0.4); }
  .notify-row button {
    background: var(--blue);
    border: none;
    padding: 14px 28px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--ink);
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .notify-row button:hover { background: var(--blue-light); }
  .notify-confirm {
    display: none;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--blue-light);
    text-transform: uppercase;
  }
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding-top: 40px;
    opacity: 0;
    animation: fadeUp 0.8s ease forwards 1.8s;
  }
  .footer-left {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    line-height: 2;
  }
  .footer-right {
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    text-align: right;
  }
  .footer-right a { color: var(--blue); text-decoration: none; }
  .corner {
    position: fixed;
    width: 24px;
    height: 24px;
    z-index: 3;
    opacity: 0.3;
  }
  .corner-tl { top: 24px; left: 24px; border-top: 1px solid var(--blue); border-left: 1px solid var(--blue); }
  .corner-tr { top: 24px; right: 24px; border-top: 1px solid var(--blue); border-right: 1px solid var(--blue); }
  .corner-bl { bottom: 24px; left: 24px; border-bottom: 1px solid var(--blue); border-left: 1px solid var(--blue); }
  .corner-br { bottom: 24px; right: 24px; border-bottom: 1px solid var(--blue); border-right: 1px solid var(--blue); }
  .scanline {
    position: fixed;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(58,143,255,0.15), transparent);
    animation: scan 8s linear infinite;
    z-index: 1;
  }
  @keyframes scan {
    0%   { top: -1px; }
    100% { top: 100vh; }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @media (max-width: 600px) {
    .container { padding: 28px 24px; }
    .notify-row input { width: 180px; }
    .footer { flex-direction: column; gap: 8px; align-items: center; text-align: center; }
  }
</style>
</head>
<body>

<div class="grid"></div>
<div class="scanline"></div>
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="container">
  <nav class="nav">
    <div>
      <div class="logo">NOVUS</div>
      <div class="logo-sub">by Novus Verify</div>
    </div>
    <div class="nav-right">
      Inbound Pre-Qualification<br>
      Infrastructure
    </div>
  </nav>

  <div class="center">
    <p class="eyebrow">Access Forthcoming</p>
    <h1 class="headline">
      <em>Something</em><br>is coming.
    </h1>
    <div class="divider"></div>
    <p class="tagline">
      <span>Eligibility Governs Engagement.</span><br>
      Not everyone gets access.<br>
      novusverify.com
    </p>

    <div class="notify-wrap">
      <div class="notify-row" id="notifyRow">
        <input type="email" id="emailInput" placeholder="your@email.com" />
        <button id="notifyBtn">Notify Me</button>
      </div>
      <p class="notify-confirm" id="confirm">&#10003; You're on the list.</p>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-left">
      &copy; 2026 Novus Verify<br>
      All rights reserved
    </div>
    <div class="footer-right">
      <a href="mailto:hello@novusverify.com">hello@novusverify.com</a>
    </div>
  </footer>
</div>

<script>
window.addEventListener('load', function() {
  var btn = document.getElementById('notifyBtn');
  var input = document.getElementById('emailInput');
  var confirm = document.getElementById('confirm');
  var row = document.getElementById('notifyRow');

  function submitEmail() {
    var email = input.value;
    if (!email || email.indexOf('@') === -1) {
      input.style.borderColor = 'rgba(255,80,80,0.4)';
      setTimeout(function() { input.style.borderColor = ''; }, 1000);
      return;
    }
    fetch('/api/notify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email })
    }).then(function() {
      row.style.display = 'none';
      confirm.style.display = 'block';
    }).catch(function(err) {
      console.error(err);
    });
  }

  btn.addEventListener('click', submitEmail);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') submitEmail();
  });
});
</script>

</body>
</html>
